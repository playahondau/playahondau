<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cabezudos — Playa Honda</title>
  <link rel="icon" href="favicon.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #060c14;
      font-family: 'Barlow Condensed', sans-serif;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      gap: 10px;
    }

    #cv-wrap {
      position: relative;
      flex-shrink: 0;
    }

    canvas {
      display: block;
      border-radius: 10px;
      box-shadow: 0 8px 48px rgba(0,0,0,.75);
    }

    /* ── Overlay ── */
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(6,12,20,.88);
      border-radius: 10px;
      z-index: 10;
      gap: 4px;
    }
    #overlay.hidden { display: none; }

    .ov-logo {
      width: 54px; height: 54px;
      object-fit: contain;
      margin-bottom: 4px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.6));
    }
    .ov-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 9vw, 4rem);
      color: #fff;
      letter-spacing: 3px;
      line-height: 1;
    }
    .ov-sub {
      font-size: clamp(.8rem, 2.8vw, 1rem);
      color: rgba(255,255,255,.45);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .ov-btns {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ov-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1rem, 3.5vw, 1.4rem);
      letter-spacing: 1.5px;
      padding: .45em 1.5em;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: transform .12s, box-shadow .12s, background .15s;
    }
    .ov-btn:hover  { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,.45); }
    .ov-btn:active { transform: translateY(0); }
    .ov-btn-primary   { background: #1a3a7a; color: #fff; }
    .ov-btn-secondary { background: rgba(255,255,255,.12); color: #fff; }
    .ov-btn-danger    { background: #7a1a1a; color: #fff; }

    /* Player picker */
    .pick-grid {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin: 8px 0 14px;
    }
    .pick-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      border: 2px solid transparent;
      background: rgba(255,255,255,.06);
      transition: border-color .15s, background .15s;
    }
    .pick-card img { width: 52px; height: 70px; object-fit: contain; pointer-events: none; }
    .pick-card span { font-size: .85rem; color: rgba(255,255,255,.7); margin-top: 4px; letter-spacing: 1px; text-transform: uppercase; }
    .pick-card.sel { border-color: #4a90e2; background: rgba(74,144,226,.18); }
    .pick-card:hover:not(.sel) { background: rgba(255,255,255,.1); }

    .ov-pick-label {
      font-size: clamp(.75rem, 2.5vw, .9rem);
      color: rgba(255,255,255,.5);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    /* Score results */
    .ov-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.8rem, 6vw, 3rem);
      color: rgba(255,255,255,.85);
      letter-spacing: 4px;
      margin-bottom: 14px;
    }
    .ov-winner {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 4vw, 2rem);
      color: #ffd700;
      letter-spacing: 2px;
      margin-bottom: 2px;
    }

    /* ── Touch controls ── */
    #touch-controls {
      display: none;
      width: 100%;
      max-width: 660px;
      justify-content: space-between;
      padding: 0 12px;
      flex-shrink: 0;
    }
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
    }

    .tc-side {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .tc-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    .tc-btn.jump {
      width: 58px; height: 58px;
      background: rgba(26,58,122,.45);
      border-color: rgba(74,144,226,.5);
      font-size: 1.5rem;
    }
    .tc-btn.kick {
      width: 58px; height: 58px;
      background: rgba(122,30,10,.55);
      border-color: rgba(220,80,30,.65);
      font-size: 1.35rem;
    }
    .tc-btn:active { background: rgba(255,255,255,.22); }

    /* ── Back link ── */
    .back-link {
      position: fixed;
      top: 10px; left: 14px;
      color: rgba(255,255,255,.35);
      font-size: .85rem;
      text-decoration: none;
      letter-spacing: 1px;
      text-transform: uppercase;
      z-index: 30;
      transition: color .2s;
    }
    .back-link:hover { color: rgba(255,255,255,.7); }

    /* ── Botón pantalla completa ── */
    #btn-fullscreen {
      display: none;
      position: fixed;
      top: 10px; right: 14px;
      z-index: 40;
      background: rgba(0,0,0,.52);
      border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.72);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: .75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: .35em .9em;
      border-radius: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background .15s;
    }
    #btn-fullscreen:active { background: rgba(255,255,255,.18); }
    @media (pointer: coarse) {
      #btn-fullscreen { display: block; }
    }

    /* ── Layout horizontal (landscape móvil) ── */
    @media (pointer: coarse) and (orientation: landscape) {
      /* Disuelve el wrapper → los .tc-side participan directamente en el flex de #wrap */
      #touch-controls { display: contents; }

      #wrap {
        flex-direction: row;
        align-items: stretch;
        gap: 0;
      }

      /* El canvas ocupa el espacio central disponible */
      #cv-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* P1 a la izquierda, P2 a la derecha del canvas */
      .tc-side:first-child { order: -1; }
      #tc-p2-side          { order:  1; }

      /* Panel lateral: cuadrícula 2×2  fila-1: ▲ ⚽  /  fila-2: ◀ ▶ */
      .tc-side {
        display: grid !important;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        align-content: center;
        justify-content: center;
        gap: 7px;
        padding: 12px 8px;
        width: 92px;
        flex-shrink: 0;
        background: rgba(0,0,0,.28);
      }

      /* Orden de botones dentro del grid */
      #tc1u { order: 1; }  /* ▲ salto   – posición (1,1) */
      #tc1k { order: 2; }  /* ⚽ patada – posición (1,2) */
      #tc1l { order: 3; }  /* ◀ izq    – posición (2,1) */
      #tc1r { order: 4; }  /* ▶ der    – posición (2,2) */

      #tc2u { order: 1; }
      #tc2k { order: 2; }
      #tc2l { order: 3; }
      #tc2r { order: 4; }

      /* Botones más compactos para landscape */
      .tc-btn      { width: 36px; height: 36px; font-size: 1rem;   }
      .tc-btn.jump { width: 36px; height: 36px; font-size: 1.1rem; }
      .tc-btn.kick { width: 36px; height: 36px; font-size: 1.05rem;}

      /* Ocultar "← Volver" en landscape (el botón FS cumple esa función de salida) */
      .back-link { display: none; }

      /* Centrar el botón FS sobre el canvas */
      #btn-fullscreen {
        top: 4px;
        right: auto;
        left: 50%;
        transform: translateX(-50%);
        font-size: .68rem;
        padding: .28em .65em;
      }
    }
  </style>
</head>
<body>
  <a class="back-link" href="index.html">← Volver</a>
  <button id="btn-fullscreen" aria-label="Pantalla completa">⛶ Pantalla completa</button>

  <div id="wrap">
    <div id="cv-wrap">
      <canvas id="cv"></canvas>

      <!-- Overlay principal (menú / picker / gameover) -->
      <div id="overlay">
        <img class="ov-logo" src="escudo.png" alt="PH">
        <div class="ov-title">CABEZUDOS</div>
        <div class="ov-sub">Playa Honda Universitario</div>
        <div class="ov-btns">
          <button class="ov-btn ov-btn-primary"   id="btn-cpu">▶ 1 Jugador (vs CPU)</button>
          <button class="ov-btn ov-btn-secondary" id="btn-2p">👥 2 Jugadores</button>
        </div>
      </div>
    </div>

    <!-- Controles táctiles -->
    <div id="touch-controls">
      <div class="tc-side">
        <div class="tc-btn" id="tc1l">◀</div>
        <div class="tc-btn jump" id="tc1u">▲</div>
        <div class="tc-btn" id="tc1r">▶</div>
        <div class="tc-btn kick" id="tc1k">⚽</div>
      </div>
      <div class="tc-side" id="tc-p2-side">
        <div class="tc-btn kick" id="tc2k">⚽</div>
        <div class="tc-btn" id="tc2l">◀</div>
        <div class="tc-btn jump" id="tc2u">▲</div>
        <div class="tc-btn" id="tc2r">▶</div>
      </div>
    </div>
  </div>

<script>
/* ═══════════════════════════════════════════════════════════
   CABEZUDOS — Playa Honda  ·  v1.0
═══════════════════════════════════════════════════════════ */

const cv      = document.getElementById('cv');
const ctx     = cv.getContext('2d');
const overlay = document.getElementById('overlay');

// ── Dimensiones lógicas fijas ─────────────────────────────
const LW = 800, LH = 450;   // logical width/height
let dpr = 1;

function resizeCanvas() {
  const isLandscape = window.innerWidth > window.innerHeight;
  const isTouch     = isTouchDevice();
  const SIDE_W      = 92; // ancho de cada panel lateral (sync con CSS)
  const sidePad     = (isTouch && isLandscape) ? SIDE_W * 2 : 0;
  const maxW  = Math.min(window.innerWidth  - sidePad - 8, 960);
  const maxH  = window.innerHeight - (isTouch && !isLandscape ? 80 : 20) - (isLandscape ? 0 : 20);
  let cw = maxW;
  let ch = Math.round(cw * LH / LW);
  if (ch > maxH) { ch = maxH; cw = Math.round(ch * LW / LH); }
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.style.width  = cw + 'px';
  cv.style.height = ch + 'px';
  cv.width  = Math.round(cw * dpr);
  cv.height = Math.round(ch * dpr);
}

function isTouchDevice() { return window.matchMedia('(pointer: coarse)').matches; }

resizeCanvas();
window.addEventListener('resize', () => {
  resizeCanvas();
  renderFrame();
}, { passive: true });

// ── Constantes de juego ───────────────────────────────────
const GRAVITY    = 0.46;
const BALL_R     = 14;
const HEAD_R     = 37;
const GROUND_Y   = LH - 58;
const GOAL_W     = 72;      // profundidad del arco
const GOAL_H     = 112;     // altura del arco
const SPRITE_H   = Math.round(GOAL_H * 0.88); // altura visual del sprite (~98px ≈ GOAL_H)
const POST_R     = 5;
const GOAL_LINE  = GOAL_W - 4;   // disparador de gol
const WIN_GOALS  = 5;
const GOAL_PAUSE = 2400;     // ms pausa post-gol
const P_SPEED    = 4.7;
const JUMP_V     = -12;
const MAX_FALL   = 16;

// ── Sprites ───────────────────────────────────────────────
const PLAYERS_DATA = [
  { key: 'feli',  name: 'Feli',  color: '#1a3a7a' },
  { key: 'rodo',  name: 'Rodo',  color: '#1a3a7a' },
  { key: 'titan', name: 'Titan', color: '#1a3a7a' },
];

const sprites = {};
let spritesReady = 0;
PLAYERS_DATA.forEach(p => {
  const img = new Image();
  img.onload = img.onerror = () => { sprites[p.key] = img; spritesReady++; };
  img.src = p.key + '-sprite.png';
});

const escudoImg = new Image();
escudoImg.src = 'escudo.png';

// ── XAXA: espectador con remoción de fondo en canvas ─────
const XAXA_COMMENTS = [
  '¡Dale Playa Honda!', '¡Qué golazo!', '¡Árbitro vendido!',
  '¡Eso! ¡Así se juega!', 'Estaba en offside...', '¡No puede ser eso!',
  '¡Fuera! ¡Fuera!', '¡Vamos vamos!', '¡Atajá ésa!',
  '¡Era penal!', '¡Campeones!', 'Eso lo para cualquiera...',
  '¡Dale, mete otro!', '¡Metele vamos!', '¡Qué pelotazo!'
];
const xaxaSpectator = { x: 340, comment: '', commentTimer: 0 };
let xaxaBgImg = null;

function removeXaxaBg(img) {
  const W = 400, H = 400;
  const tc = document.createElement('canvas');
  tc.width = W; tc.height = H;
  const tctx = tc.getContext('2d', { willReadFrequently: true });
  tctx.drawImage(img, 0, 0, W, H);
  const id = tctx.getImageData(0, 0, W, H);
  const d = id.data;
  const visited = new Uint8Array(W * H);
  // Semillas: esquinas + borde superior
  const seeds = [[0,0],[W-1,0],[0,H-1],[W-1,H-1],[W>>1,0],[W>>2,0],[(W*3)>>2,0]];
  const bgS = seeds.map(([x,y])=>{ const i=(y*W+x)*4; return [d[i],d[i+1],d[i+2]]; });
  const queue = [];
  seeds.forEach(([x,y])=>{ const p=y*W+x; if(!visited[p]){visited[p]=1;queue.push(p);} });
  function distBg(p){ const i=p*4,r=d[i],g=d[i+1],b=d[i+2]; let m=9999; for(const[br,bg,bb]of bgS){const v=Math.abs(r-br)+Math.abs(g-bg)+Math.abs(b-bb);if(v<m)m=v;} return m; }
  let qi=0;
  while(qi<queue.length){
    const p=queue[qi++]; d[p*4+3]=0;
    const x=p%W,y=(p/W)|0;
    if(x>0   &&!visited[p-1]&&distBg(p-1)<62){visited[p-1]=1;queue.push(p-1);}
    if(x<W-1 &&!visited[p+1]&&distBg(p+1)<62){visited[p+1]=1;queue.push(p+1);}
    if(y>0   &&!visited[p-W]&&distBg(p-W)<62){visited[p-W]=1;queue.push(p-W);}
    if(y<H-1 &&!visited[p+W]&&distBg(p+W)<62){visited[p+W]=1;queue.push(p+W);}
  }
  tctx.putImageData(id,0,0);
  const r=new Image(); r.src=tc.toDataURL(); return r;
}

const xaxaRawImg = new Image();
xaxaRawImg.onload = () => { xaxaBgImg = removeXaxaBg(xaxaRawImg); };
xaxaRawImg.src = 'img/xaxa-cabezudo.jpg';


// ── Estado global ─────────────────────────────────────────
let state      = 'menu';   // menu | pick1 | pick2 | countdown | playing | goal | gameover
let mode       = 'cpu';    // cpu | local
let raf        = 0;
let goalTimer  = 0;
let goalFlash  = 0;
let confetti   = [];
let goalSide   = 0;        // 0=p1 scored, 1=p2 scored
let countdownN = 3;
let countdownT = 0;
let p1sel      = 'feli';
let p2sel      = 'titan';

// ── Jugadores y pelota ────────────────────────────────────
let p1, p2, ball;

function makePlayer(side, key) {
  const data = PLAYERS_DATA.find(p => p.key === key);
  return {
    x: side === 0 ? 160 : LW - 160,
    y: GROUND_Y - HEAD_R,
    vx: 0, vy: 0,
    side,
    key,
    name:    data ? data.name  : key,
    color:   data ? data.color : '#1a3a7a',
    score:        0,
    facingR:      side === 0,
    onGround:     false,
    jumpUsed:     0,
    kickCooldown: 0,
    kickFlash:    0
  };
}

function resetBall(toSide) {
  ball = {
    x: LW / 2,
    y: GROUND_Y - 180,
    vx: (toSide === 0 ? -2.5 : 2.5),
    vy: -1.5,
    prevY: GROUND_Y - 180
  };
}

function resetPositions() {
  p1.x = 160;          p1.y = GROUND_Y - HEAD_R;
  p1.vx = 0; p1.vy = 0; p1.onGround = false; p1.jumpUsed = 0;
  p2.x = LW - 160;    p2.y = GROUND_Y - HEAD_R;
  p2.vx = 0; p2.vy = 0; p2.onGround = false; p2.jumpUsed = 0;
}

// ── Input teclado ─────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
}, { passive: false });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Edge-trigger para salto (evita saltar continuamente)
const prevJump = { p1: false, p2: false };
function edgeJump(now, prev) { const e = now && !prev; return e; }

// ── Touch controls ────────────────────────────────────────
const TC = { p1l:0, p1r:0, p1u:0, p1k:0, p2l:0, p2r:0, p2u:0, p2k:0 };

function bindTC(id, prop) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart',  e => { e.preventDefault(); TC[prop] = 1; }, { passive: false });
  el.addEventListener('touchend',    e => { e.preventDefault(); TC[prop] = 0; }, { passive: false });
  el.addEventListener('touchcancel', () => { TC[prop] = 0; });
}
bindTC('tc1l','p1l'); bindTC('tc1r','p1r'); bindTC('tc1u','p1u'); bindTC('tc1k','p1k');
bindTC('tc2l','p2l'); bindTC('tc2r','p2r'); bindTC('tc2u','p2u'); bindTC('tc2k','p2k');

// Ocultar controles P2 en modo CPU
function syncTouchUI() {
  const p2side = document.getElementById('tc-p2-side');
  if (p2side) p2side.style.visibility = (mode === 'cpu') ? 'hidden' : 'visible';
}

// ── Física: jugador ───────────────────────────────────────
function updatePlayer(pl, left, right, jumpEdge) {
  // Horizontal
  if (left)  { pl.vx -= 1.3; pl.facingR = false; }
  if (right) { pl.vx += 1.3; pl.facingR = true;  }
  if (!left && !right) pl.vx *= 0.76;
  pl.vx = Math.max(-P_SPEED, Math.min(P_SPEED, pl.vx));

  // Salto (máx 2 saltos aéreos)
  if (jumpEdge && pl.jumpUsed < 2) {
    pl.vy = pl.jumpUsed === 0 ? JUMP_V : JUMP_V * 0.72;
    pl.jumpUsed++;
    pl.onGround = false;
  }

  // Cooldowns
  pl.kickCooldown = Math.max(0, pl.kickCooldown - 1);
  pl.kickFlash    = Math.max(0, pl.kickFlash    - 1);

  // Gravedad
  pl.vy = Math.min(pl.vy + GRAVITY, MAX_FALL);

  // Mover
  pl.x += pl.vx;
  pl.y += pl.vy;

  // Límites laterales (permite entrar al arco)
  if (pl.x < HEAD_R + 1)      { pl.x = HEAD_R + 1;      pl.vx = 0; }
  if (pl.x > LW - HEAD_R - 1) { pl.x = LW - HEAD_R - 1; pl.vx = 0; }

  // Piso
  if (pl.y >= GROUND_Y - HEAD_R) {
    pl.y = GROUND_Y - HEAD_R;
    pl.vy = 0;
    pl.onGround = true;
    pl.jumpUsed = 0;
  } else {
    pl.onGround = false;
  }

  // Techo
  if (pl.y - HEAD_R < 0) { pl.y = HEAD_R; pl.vy = Math.abs(pl.vy) * 0.3; }
}

// ── Física: pelota ────────────────────────────────────────
const MAX_BALL_V = 16; // clamp velocidad máxima para evitar tunneling

function updateBall() {
  ball.prevY = ball.y; // guardar posición anterior para CCD del travesaño

  // Clampear velocidad máxima (previene que la pelota atraviese jugadores)
  ball.vx = Math.max(-MAX_BALL_V, Math.min(MAX_BALL_V, ball.vx));
  ball.vy = Math.max(-MAX_BALL_V, Math.min(MAX_BALL_V, ball.vy));

  ball.vy = Math.min(ball.vy + GRAVITY * 0.84, MAX_FALL);
  ball.vx *= 0.993;
  ball.x  += ball.vx;
  ball.y  += ball.vy;

  // Piso
  if (ball.y + BALL_R > GROUND_Y) {
    ball.y  = GROUND_Y - BALL_R;
    ball.vy *= -0.56;
    ball.vx *= 0.93;
    if (Math.abs(ball.vy) < 1.2) ball.vy = 0;
  }
  // Techo
  if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.vy = Math.abs(ball.vy) * 0.7; }

  // Pared izquierda (parte que NO es el arco)
  if (ball.x - BALL_R < 0) {
    ball.x = BALL_R;
    ball.vx = Math.abs(ball.vx) * 0.45; // efecto red
  }
  // Pared derecha
  if (ball.x + BALL_R > LW) {
    ball.x = LW - BALL_R;
    ball.vx = -Math.abs(ball.vx) * 0.45;
  }

  // Rebotar en el poste vertical (x=GOAL_W, x=LW-GOAL_W)
  bouncePost(GOAL_W,      GROUND_Y - GOAL_H); // post top izquierdo
  bouncePost(LW - GOAL_W, GROUND_Y - GOAL_H); // post top derecho

  // Rebotar en los travesaños horizontales
  bounceCrossbar();
}

function bounceCrossbar() {
  var cy = GROUND_Y - GOAL_H; // y del travesaño

  function checkCrossbar() {
    // CCD: ¿la pelota cruzó de arriba hacia abajo este frame?
    // (prevY por encima o en el travesaño, ahora por debajo)
    if (ball.prevY <= cy + BALL_R && ball.y + BALL_R > cy) {
      // Vino desde arriba → devolver por encima del travesaño (NO es gol)
      ball.y  = cy - BALL_R - 1;
      ball.vy = -Math.abs(ball.vy) * 0.55;
      ball.vx *= 0.75;
      return;
    }
    // Underside: pelota dentro del arco golpeando el travesaño desde abajo
    if (ball.y - BALL_R < cy + POST_R && ball.y > cy && ball.vy < 0) {
      ball.y  = cy + BALL_R + POST_R;
      ball.vy = Math.abs(ball.vy) * 0.55;
      ball.vx *= 0.80;
    }
  }

  // Arco izquierdo: travesaño de x=0 a x=GOAL_W
  if (ball.x < GOAL_W + BALL_R && ball.x > -BALL_R) checkCrossbar();

  // Arco derecho: travesaño de x=LW-GOAL_W a x=LW
  if (ball.x > LW - GOAL_W - BALL_R && ball.x < LW + BALL_R) checkCrossbar();
}

function bouncePost(px, py) {
  // Colisión pelota-poste (esfera-punto)
  const dx = ball.x - px, dy = ball.y - py;
  const d  = Math.sqrt(dx*dx + dy*dy);
  const md = BALL_R + POST_R;
  if (d < md && d > 0.01) {
    const nx = dx/d, ny = dy/d;
    ball.x = px + nx * md;
    ball.y = py + ny * md;
    const dot = ball.vx*nx + ball.vy*ny;
    ball.vx -= 2*dot*nx * 0.65;
    ball.vy -= 2*dot*ny * 0.65;
  }
}

// ── Colisión pelota-cabeza ────────────────────────────────
function collideBallHead(pl) {
  const dx = ball.x - pl.x, dy = ball.y - pl.y;
  const d  = Math.sqrt(dx*dx + dy*dy);
  const md = BALL_R + HEAD_R;
  if (d < md && d > 0.01) {
    const nx = dx/d, ny = dy/d;
    // Separar
    const ov = md - d;
    ball.x += nx * ov * 0.85;
    ball.y += ny * ov * 0.85;
    pl.x   -= nx * ov * 0.15;
    // Velocidad relativa sobre la normal
    const rvx = ball.vx - pl.vx;
    const rvy = ball.vy - pl.vy;
    const vn  = rvx*nx + rvy*ny;
    if (vn < 0) {
      const imp = -(1 + 0.72) * vn;
      ball.vx += imp * nx;
      ball.vy += imp * ny;
      pl.vx   -= imp * nx * 0.14;
    }
  }
}

// ── Colisión jugador-jugador ──────────────────────────────
function collidePlayerPlayer() {
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const d  = Math.sqrt(dx*dx + dy*dy);
  const md = HEAD_R * 2;
  if (d < md && d > 0.01) {
    const nx = dx/d, ny = dy/d;
    const ov = (md - d) * 0.5;
    p1.x -= nx * ov; p1.y -= ny * ov;
    p2.x += nx * ov; p2.y += ny * ov;
    const rvx = p2.vx - p1.vx, rvy = p2.vy - p1.vy;
    const vn  = rvx*nx + rvy*ny;
    if (vn < 0) {
      const imp = -(1 + 0.35) * vn * 0.5;
      p1.vx -= imp*nx; p1.vy -= imp*ny;
      p2.vx += imp*nx; p2.vy += imp*ny;
    }
  }
}

// ── Detección de gol ──────────────────────────────────────
function checkGoal() {
  const inLeft  = ball.x < GOAL_LINE     && ball.y > GROUND_Y - GOAL_H + 5 && ball.y < GROUND_Y;
  const inRight = ball.x > LW - GOAL_LINE && ball.y > GROUND_Y - GOAL_H + 5 && ball.y < GROUND_Y;
  if (inLeft)  { p2.score++; goalSide = 1; triggerGoal(); }
  if (inRight) { p1.score++; goalSide = 0; triggerGoal(); }
}

function triggerGoal() {
  if (state !== 'playing') return;
  state     = 'goal';
  goalFlash = 1;
  spawnConfetti();
  xaxaComment();
  setTimeout(() => {
    if (p1.score >= WIN_GOALS || p2.score >= WIN_GOALS) {
      state = 'gameover';
      showGameover();
    } else {
      resetBall(goalSide === 0 ? 0 : 1);
      resetPositions();
      state = 'playing';
    }
  }, GOAL_PAUSE);
}

// ── Patada ────────────────────────────────────────────────
const KICK_DASH   = 8.8;   // impulso horizontal al patear
const KICK_CD     = 30;    // frames de cooldown
const KICK_REACH  = HEAD_R + BALL_R + 22; // distancia máxima para golpear

function tryKick(pl) {
  if (pl.kickCooldown > 0) return;
  const dir = pl.facingR ? 1 : -1;

  // Lanzarse hacia adelante
  pl.vx += dir * KICK_DASH;
  pl.vy  = Math.min(pl.vy, -2); // pequeño salto al patear

  // ¿La pelota está al alcance?
  const dx   = ball.x - pl.x;
  const dy   = ball.y - pl.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < KICK_REACH) {
    // Golpe fuerte en la dirección que enfrenta el jugador
    ball.vx  = dir * 13 + pl.vx * 0.4;
    ball.vy  = -6 + pl.vy * 0.3;
    pl.kickFlash = 14;
  } else {
    pl.kickFlash = 7; // anim de intento fallido
  }
  pl.kickCooldown = KICK_CD;
}

// ── CPU AI ────────────────────────────────────────────────
let cpuJumpCooldown = 0;

function getInputCPU() {
  const bx  = ball.x, by = ball.y;
  const bvx = ball.vx, bvy = ball.vy;
  const px  = p2.x,   py  = p2.y;

  // Predicción posición pelota en N frames
  const N   = 16;
  let pbx   = bx + bvx * N;
  let pby   = by + bvy * N + 0.5 * GRAVITY * 0.84 * N * N;

  // Objetivo: posicionarse un poco detrás de la pelota (desde el lado del CPU)
  let targetX = bx + (LW * 0.5 - bx) * 0.08;

  // Jugar un poco agresivo si la pelota está en lado del CPU
  if (bx > LW * 0.52) {
    targetX = bx - 28;   // acercarse para golpear
  } else {
    targetX = LW * 0.62; // retroceder a posición neutral
  }

  // Ruido para que no sea perfecto
  targetX += (Math.sin(Date.now() * 0.003) * 20);

  const diff  = targetX - px;
  const left  = diff < -10;
  const right = diff > 10;

  cpuJumpCooldown = Math.max(0, cpuJumpCooldown - 1);
  const wantsJump = by < py - 55 && Math.abs(bx - px) < 130 && cpuJumpCooldown === 0;
  if (wantsJump) cpuJumpCooldown = 22;

  return { left, right, jumpNow: wantsJump };
}

// ── Confeti ───────────────────────────────────────────────
function spawnConfetti() {
  confetti = [];
  const cols = ['#1a3a7a','#ffffff','#cc2222','#ffd700','#00bb55','#4a90e2'];
  for (let i = 0; i < 90; i++) {
    confetti.push({
      x:    LW/2 + (Math.random()-.5)*240,
      y:    LH/2 - 60,
      vx:   (Math.random()-.5) * 9,
      vy:   Math.random() * -9 - 2,
      r:    3.5 + Math.random() * 5.5,
      col:  cols[Math.floor(Math.random()*cols.length)],
      rot:  Math.random()*Math.PI*2,
      rotv: (Math.random()-.5) * 0.28,
      rect: Math.random() > 0.5
    });
  }
}

function updateConfetti() {
  confetti.forEach(c => {
    c.x += c.vx; c.y += c.vy; c.vy += 0.21; c.vx *= 0.988; c.rot += c.rotv;
  });
  confetti = confetti.filter(c => c.y < LH + 30);
}

// ── Dibujado ──────────────────────────────────────────────
function drawField() {
  // ── CIELO típico Nicolich: plomizo con algo de celeste ──
  const skyGr = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  skyGr.addColorStop(0,   '#6080a8');
  skyGr.addColorStop(0.45,'#8eaacc');
  skyGr.addColorStop(1,   '#a8c0d4');
  ctx.fillStyle = skyGr;
  ctx.fillRect(0, 0, LW, GROUND_Y);

  // ── NUBES (grises, cielo cubierto tipo invierno uruguayo) ──
  function cloud(cx, cy, r, a) {
    ctx.save(); ctx.globalAlpha = a;
    ctx.fillStyle = '#d8dce2';
    [[0,0,1],[.8,-.25,.7],[-.72,-.1,.62],[.42,.12,.52],[-.4,.06,.46]].forEach(([dx,dy,f])=>{
      ctx.beginPath(); ctx.arc(cx+dx*r, cy+dy*r, r*f, 0, Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }
  cloud(80,  42, 32, .70); cloud(280, 28, 22, .65);
  cloud(500, 38, 26, .68); cloud(680, 22, 18, .62); cloud(760, 50, 14, .58);

  // ── MONTAÑAS DE BASURA (basurero de Nicolich, al fondo izquierda) ──
  // Siluetas de cerros de residuos
  const tH = GROUND_Y; // shorthand
  ctx.save(); ctx.globalAlpha = 0.78;
  // Cerro 1 (grande)
  ctx.fillStyle = '#7a7255';
  ctx.beginPath();
  ctx.moveTo(0, tH - 30);
  ctx.bezierCurveTo(20, tH-110, 80, tH-145, 140, tH-130);
  ctx.bezierCurveTo(190, tH-155, 240, tH-120, 270, tH-60);
  ctx.lineTo(270, tH); ctx.lineTo(0, tH); ctx.closePath(); ctx.fill();
  // Cerro 2 (detrás)
  ctx.fillStyle = '#8a8060';
  ctx.beginPath();
  ctx.moveTo(0, tH-20);
  ctx.bezierCurveTo(30, tH-90, 100, tH-125, 170, tH-105);
  ctx.bezierCurveTo(210, tH-120, 250, tH-90, 290, tH-40);
  ctx.lineTo(290, tH); ctx.lineTo(0, tH); ctx.closePath(); ctx.fill();
  // Textura de residuos: manchitas de colores
  const trashColors = ['#c8b840','#a04820','#60a048','#c84040','#40608a','#e0e0d0'];
  for (let i = 0; i < 38; i++) {
    const tx = 10 + (Math.sin(i*7.3)*0.5+0.5)*240;
    const ty = tH - 20 - (Math.sin(i*3.7)*0.5+0.5) * 100;
    ctx.fillStyle = trashColors[i % trashColors.length];
    ctx.beginPath(); ctx.arc(tx, ty, 3+Math.sin(i*2.1)*1.5, 0, Math.PI*2); ctx.fill();
  }
  // Humo/vapor del basurero
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#c8c0b0';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.arc(50+i*38, tH-130-i*12, 14+i*4, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // ── GAVIOTAS sobrevolando el basurero ──
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.2;
  [[55,95],[90,80],[130,105],[70,118],[110,90]].forEach(([gx, gy2]) => {
    ctx.beginPath();
    ctx.moveTo(gx-6, gy2); ctx.quadraticCurveTo(gx, gy2-5, gx+6, gy2);
    ctx.stroke();
  });

  // ── EUCALIPTOS (hilera al fondo, típico del complejo) ──
  function eucalipto(x, h) {
    // Tronco delgado y alto
    ctx.fillStyle = '#7a6040';
    ctx.fillRect(x-3, GROUND_Y - h, 6, h * 0.55);
    // Copa: forma alargada vertical (eucalipto)
    ctx.fillStyle = '#3a6830';
    ctx.beginPath();
    ctx.ellipse(x, GROUND_Y - h*0.72, 10, h*0.32, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4a7c3a';
    ctx.beginPath();
    ctx.ellipse(x-4, GROUND_Y - h*0.78, 7, h*0.22, -0.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x+4, GROUND_Y - h*0.76, 7, h*0.22, 0.2, 0, Math.PI*2); ctx.fill();
  }
  // Hilera central de eucaliptos al fondo
  [340,380,420,460,500,540,580,620,660,700,740].forEach((x,i) => {
    eucalipto(x, 95 + Math.sin(i*1.8)*15);
  });
  // Eucaliptos laterales
  eucalipto(310, 110); eucalipto(760, 100); eucalipto(780, 85);

  // ── XAXA: espectador en gradas (antes del alambrado = queda detrás de la reja) ──
  if (xaxaBgImg && xaxaBgImg.complete && xaxaBgImg.naturalWidth) {
    const xH = SPRITE_H;
    ctx.drawImage(xaxaBgImg, xaxaSpectator.x - xH/2, GROUND_Y - 44 - xH, xH, xH);
  }

  // ── ALAMBRADO / TEJIDO METÁLICO (perímetro del complejo) ──
  ctx.save(); ctx.globalAlpha = 0.30;
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 0.8;
  // Postes
  for (let px = 0; px <= LW; px += 55) {
    ctx.beginPath();
    ctx.moveTo(px, GROUND_Y - 45); ctx.lineTo(px, GROUND_Y - 2); ctx.stroke();
  }
  // Tejido horizontal
  for (let ly = GROUND_Y - 42; ly < GROUND_Y - 2; ly += 10) {
    ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(LW, ly); ctx.stroke();
  }
  // Diagonales (rombo)
  for (let px = -20; px < LW; px += 14) {
    ctx.beginPath(); ctx.moveTo(px, GROUND_Y-2); ctx.lineTo(px+28, GROUND_Y-44); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+14, GROUND_Y-2); ctx.lineTo(px-14, GROUND_Y-44); ctx.stroke();
  }
  ctx.restore();

  // ── GENTE DE PIE (público sin tribuna, costado del campo) ──
  const spectColors = ['#1a3a8f','#c02020','#f0f0f0','#228840','#222222','#8840c0'];
  for (let i = 0; i < 18; i++) {
    const sx = 30 + i * 42 + Math.sin(i*3.7)*6;
    const sh2 = 22 + Math.sin(i*2.3)*4;
    const col = spectColors[i % spectColors.length];
    // Cuerpo
    ctx.fillStyle = col;
    ctx.fillRect(sx, GROUND_Y - sh2 - 8, 9, sh2);
    // Cabeza
    ctx.beginPath(); ctx.arc(sx+4, GROUND_Y - sh2 - 12, 5, 0, Math.PI*2);
    ctx.fillStyle = '#d4a07a'; ctx.fill();
  }

  // ── ARCOS ──
  drawGoal(0); drawGoal(1);

  // ── CÉSPED franjeado ──
  for (let i = 0; i < LW; i += 46) {
    ctx.fillStyle = i % 92 === 0 ? '#1e7220' : '#196618';
    ctx.fillRect(i, GROUND_Y, 46, LH - GROUND_Y);
  }
  const grassGr = ctx.createLinearGradient(0, GROUND_Y-2, 0, GROUND_Y+5);
  grassGr.addColorStop(0, '#5ad85a'); grassGr.addColorStop(1, '#196618');
  ctx.fillStyle = grassGr;
  ctx.fillRect(0, GROUND_Y-2, LW, 7);

  // ── LÍNEA CENTRAL Y CÍRCULO ──
  ctx.save();
  ctx.setLineDash([6,6]);
  ctx.strokeStyle = 'rgba(255,255,255,.20)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(LW/2, GROUND_Y-80); ctx.lineTo(LW/2, GROUND_Y); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();
  ctx.beginPath(); ctx.arc(LW/2, GROUND_Y-80, 72, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,.17)'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.beginPath(); ctx.arc(LW/2, GROUND_Y-80, 3, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,.24)'; ctx.fill();

  // ── CARTEL "PARQUE CUPRA" ──
  const signW = 170, signH = 20, signX = LW/2-85, signY = 28;
  ctx.fillStyle = 'rgba(0,8,30,.78)';
  ctx.beginPath(); ctx.roundRect(signX, signY, signW, signH, 3); ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,0,.5)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.font = 'bold 12px Bebas Neue, sans-serif';
  ctx.textAlign = 'center'; ctx.fillStyle = '#ffd700';
  ctx.fillText('PARQUE CUPRA — FELIPE CARDOZO', LW/2, signY+14);

  // ── TABLEROS PUBLICITARIOS ──
  const adBoards = [
    { text: 'PARQUE CUPRA',  bg: '#002654', fg: '#ffd700' },
    { text: 'PLAYA HONDA U', bg: '#1a3a7a', fg: '#ffffff' },
    { text: 'PARQUE CUPRA',  bg: '#002654', fg: '#ffd700' },
    { text: 'PHU',           bg: '#1a3a7a', fg: '#ffffff' },
  ];
  const adH = 16, adY = GROUND_Y+6, adBw = LW/adBoards.length;
  adBoards.forEach((b,i) => {
    ctx.fillStyle = b.bg;
    ctx.fillRect(i*adBw, adY, adBw-1, adH);
    ctx.font = 'bold 11px Bebas Neue, sans-serif';
    ctx.textAlign = 'center'; ctx.fillStyle = b.fg;
    ctx.fillText(b.text, i*adBw+adBw/2, adY+11);
  });
}

function drawGoal(side) {
  const gx = side === 0 ? 0 : LW - GOAL_W;
  const gy = GROUND_Y - GOAL_H;

  // Red (fondo translúcido)
  ctx.fillStyle = 'rgba(255,255,255,.03)';
  ctx.fillRect(gx, gy, GOAL_W, GOAL_H);

  // Líneas de red
  ctx.strokeStyle = 'rgba(255,255,255,.08)';
  ctx.lineWidth   = 0.7;
  for (let x = gx; x <= gx + GOAL_W; x += 11) {
    ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, GROUND_Y); ctx.stroke();
  }
  for (let y = gy; y <= GROUND_Y; y += 11) {
    ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx + GOAL_W, y); ctx.stroke();
  }

  // Postes
  const postX  = side === 0 ? GOAL_W : LW - GOAL_W;
  const backX  = side === 0 ? 0 : LW;
  const lineW  = POST_R * 2;

  ctx.lineCap     = 'round';
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth   = lineW;

  // Poste vertical (frente)
  ctx.beginPath(); ctx.moveTo(postX, gy); ctx.lineTo(postX, GROUND_Y); ctx.stroke();
  // Poste vertical (fondo)
  ctx.beginPath(); ctx.moveTo(backX, gy); ctx.lineTo(backX, GROUND_Y); ctx.stroke();
  // Travesaño
  ctx.beginPath(); ctx.moveTo(backX, gy); ctx.lineTo(postX, gy); ctx.stroke();

  // Círculo en el poste superior (ángulo)
  ctx.beginPath();
  ctx.arc(postX, gy, POST_R + 1, 0, Math.PI*2);
  ctx.fillStyle = '#f0f0f0';
  ctx.fill();
}

function drawPlayerSprite(pl) {
  ctx.save();
  ctx.translate(pl.x, pl.y);
  if (!pl.facingR) ctx.scale(-1, 1);

  const spr    = sprites[pl.key];
  const hasSpr = !!(spr && spr.complete && spr.naturalWidth);

  // ── Sombra en el piso ──
  const distG = GROUND_Y - pl.y;   // = HEAD_R cuando está en el suelo
  const sf    = Math.max(0.3, 1 - distG / 200);
  ctx.fillStyle = `rgba(0,0,0,${0.2 * sf})`;
  ctx.beginPath();
  ctx.ellipse(0, distG, SPRITE_H * 0.28 * sf, 5 * sf, 0, 0, Math.PI*2);
  ctx.fill();

  // ── Flash de patada (onda) ──
  if (pl.kickFlash > 0) {
    const alpha  = pl.kickFlash / 14;
    const radius = HEAD_R + 8 + (14 - pl.kickFlash) * 2.4;
    ctx.beginPath();
    ctx.arc(0, 0, radius, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,190,30,${alpha})`;
    ctx.lineWidth   = 3.5;
    ctx.stroke();
  }

  if (hasSpr) {
    // ── Sprite cabezudo completo (sin recortar a círculo) ──
    // El sprite ya tiene la forma cabezudo: cabeza gigante + cuerpo pequeño.
    // Dibujamos el personaje entero; la cabeza de la imagen se alinea con
    // el círculo de colisión (HEAD_R).
    const sw = spr.naturalWidth, sh = spr.naturalHeight;

    // Sprite anclado por el FONDO: pies siempre en GROUND_Y (= pl.y + HEAD_R).
    // La física sigue usando pl.y = GROUND_Y - HEAD_R → esfera de colisión
    // llega hasta el suelo, garantizando impacto con pelota rasante.
    const charH  = SPRITE_H;                // altura fija proporcional al arco
    const charW  = charH * (sw / sh);       // ancho según aspecto real del sprite
    const yBottom = HEAD_R;                 // en coords traducidas, fondo = HEAD_R debajo de pl.y

    ctx.drawImage(spr, -charW / 2, yBottom - charH, charW, charH);

  } else {
    // ── Fallback: círculo + piernas dibujados ──
    ctx.beginPath();
    ctx.arc(0, 0, HEAD_R + 3.5, 0, Math.PI*2);
    ctx.fillStyle = pl.color; ctx.fill();

    ctx.beginPath();
    ctx.arc(0, 0, HEAD_R, 0, Math.PI*2);
    ctx.clip();
    ctx.fillStyle = '#c8956c';
    ctx.fillRect(-HEAD_R, -HEAD_R, HEAD_R * 2, HEAD_R * 2);
    ctx.restore();
    ctx.save();
    ctx.translate(pl.x, pl.y);
    if (!pl.facingR) ctx.scale(-1, 1);

    const legH = 22, offL = HEAD_R * 0.3, legW = 11;
    ctx.fillStyle = pl.color;
    ctx.fillRect(-offL - legW/2, HEAD_R - 4, legW, legH);
    ctx.fillRect( offL - legW/2, HEAD_R - 4, legW, legH);
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(-offL, HEAD_R + legH - 2, 9, 5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse( offL, HEAD_R + legH - 2, 9, 5, 0, 0, Math.PI*2); ctx.fill();
  }

  // ── Nombre sobre la cabeza (sin invertir) ──
  // Deshacer el flip antes de dibujar texto para que no se espeje
  if (!pl.facingR) ctx.scale(-1, 1);
  const nameOffY = hasSpr ? -(HEAD_R * 2.15) : -(HEAD_R + 6);
  ctx.font = 'bold 10px Barlow Condensed, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillText(pl.name.toUpperCase(), 1, nameOffY + 1);
  ctx.fillStyle = '#fff';
  ctx.fillText(pl.name.toUpperCase(), 0, nameOffY);

  ctx.restore();
}

function drawBallSprite() {
  const bx = ball.x, by = ball.y;

  // Sombra proyectada en el piso
  const dist = GROUND_Y - by;
  const sf   = Math.max(0.25, 1 - dist / 280);
  ctx.fillStyle = `rgba(0,0,0,${0.28 * sf})`;
  ctx.beginPath();
  ctx.ellipse(bx, GROUND_Y, BALL_R * sf, BALL_R * 0.36 * sf, 0, 0, Math.PI*2);
  ctx.fill();

  // Pelota
  ctx.save();
  ctx.translate(bx, by);

  const gr = ctx.createRadialGradient(-BALL_R*.3, -BALL_R*.35, 1, 0, 0, BALL_R);
  gr.addColorStop(0, '#ffffff');
  gr.addColorStop(1, '#c0c0c0');

  ctx.beginPath();
  ctx.arc(0, 0, BALL_R, 0, Math.PI*2);
  ctx.fillStyle = gr;
  ctx.fill();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Patrón de fútbol (pentágonos simplificados)
  ctx.fillStyle = '#222';
  hexPatch(0, 0, BALL_R * 0.37);
  const pa = (Math.PI * 2) / 5;
  for (let i = 0; i < 5; i++) {
    const a = i * pa - Math.PI/2;
    hexPatch(Math.cos(a)*BALL_R*0.65, Math.sin(a)*BALL_R*0.65, BALL_R*0.26);
  }

  ctx.restore();
}

function hexPatch(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3;
    i === 0 ? ctx.moveTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r)
             : ctx.lineTo(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
  }
  ctx.closePath();
  ctx.fill();
}

function drawHUD() {
  // Barra superior semitransparente
  ctx.fillStyle = 'rgba(0,0,0,.6)';
  ctx.fillRect(0, 0, LW, 44);

  ctx.font = 'bold 26px Bebas Neue, sans-serif';

  // P1
  ctx.textAlign = 'left';
  ctx.fillStyle = p1.color;
  ctx.fillText(p1.name, 14, 31);
  ctx.fillStyle = '#fff';
  const p1nw = ctx.measureText(p1.name).width;
  ctx.fillText('  ' + p1.score, 14 + p1nw, 31);

  // P2
  ctx.textAlign = 'right';
  ctx.fillStyle = p2.color;
  const p2txt = p2.score + '  ';
  const p2sw  = ctx.measureText(p2txt).width;
  ctx.fillStyle = '#fff';
  ctx.fillText(p2.score + '  ', LW - 14, 31);
  ctx.fillStyle = p2.color;
  ctx.fillText(p2.name, LW - 14 - p2sw, 31);

  // Separador central
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  ctx.font = '18px Barlow Condensed, sans-serif';
  ctx.fillText('—', LW/2, 28);

  // Mini hint controles (solo en PC)
  if (!isTouchDevice()) {
    ctx.font = '10px Barlow Condensed, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,.25)';
    ctx.textAlign = 'left';
    ctx.fillText('P1: A D  W=salto  S=patada  |  Xaxa: Q/E=mover  R=comentar', 8, LH - 5);
    if (mode === 'local') {
      ctx.textAlign = 'right';
      ctx.fillText('P2: ← →  ↑=salto  ↓=patada', LW - 8, LH - 5);
    }
  }
}

function drawGoalFlash() {
  if (goalFlash <= 0) return;
  ctx.fillStyle = `rgba(255,255,255,${goalFlash * 0.32})`;
  ctx.fillRect(0, 0, LW, LH);
  goalFlash = Math.max(0, goalFlash - 0.055);
}

function drawGoalText() {
  if (state !== 'goal') return;
  const scorer = goalSide === 0 ? p1 : p2;

  ctx.save();
  // Sombra
  ctx.font = 'bold 82px Bebas Neue, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,.5)';
  ctx.fillText('¡GOL!', LW/2 + 3, LH/2 + 4);
  // Texto
  ctx.fillStyle = scorer.color;
  ctx.fillText('¡GOL!', LW/2, LH/2);
  // Sub
  ctx.font = '600 20px Barlow Condensed, sans-serif';
  ctx.fillStyle = '#fff';
  ctx.fillText(scorer.name + ' anotó!', LW/2, LH/2 + 38);
  ctx.restore();
}

function drawCountdown() {
  if (state !== 'countdown') return;
  ctx.save();
  ctx.font = 'bold 100px Bebas Neue, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,0,0,.4)';
  ctx.fillText(countdownN, LW/2 + 3, LH/2 + 36 + 4);
  ctx.fillStyle = '#fff';
  ctx.fillText(countdownN, LW/2, LH/2 + 36);
  ctx.restore();
}

function drawConfetti() {
  confetti.forEach(c => {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.fillStyle = c.col;
    if (c.rect) {
      ctx.fillRect(-c.r/2, -c.r/4, c.r, c.r * 0.45);
    } else {
      ctx.beginPath();
      ctx.arc(0, 0, c.r * 0.5, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

// ── Xaxa: update y diálogo ───────────────────────────────
function updateXaxa() {
  const sp = 3.2;
  if (keys['KeyQ']) xaxaSpectator.x = Math.max(90,  xaxaSpectator.x - sp);
  if (keys['KeyE']) xaxaSpectator.x = Math.min(710, xaxaSpectator.x + sp);
  if (xaxaSpectator.commentTimer > 0) xaxaSpectator.commentTimer--;
}

function xaxaComment() {
  xaxaSpectator.comment = XAXA_COMMENTS[Math.floor(Math.random()*XAXA_COMMENTS.length)];
  xaxaSpectator.commentTimer = 220;
}

function drawSpeechBubble() {
  if (!xaxaBgImg || xaxaSpectator.commentTimer <= 0) return;
  const xH = SPRITE_H;
  const cx  = xaxaSpectator.x;
  const cy  = GROUND_Y - 44 - xH - 2;
  const txt = xaxaSpectator.comment;
  ctx.save();
  ctx.font = 'bold 11px Barlow Condensed, sans-serif';
  const tw = ctx.measureText(txt).width;
  const pad = 7, bw = tw + pad*2, bh = 20;
  let bx = cx - bw/2;
  bx = Math.max(4, Math.min(LW - bw - 4, bx)); // no salir del canvas
  const by = cy - bh - 9;
  // Burbuja
  ctx.fillStyle = 'rgba(255,255,255,0.96)';
  ctx.strokeStyle = '#222'; ctx.lineWidth = 1;
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(bx, by, bw, bh, 4); else ctx.rect(bx, by, bw, bh);
  ctx.fill(); ctx.stroke();
  // Cola
  ctx.beginPath();
  ctx.moveTo(cx-5, by+bh); ctx.lineTo(cx, by+bh+9); ctx.lineTo(cx+5, by+bh);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,255,0.96)'; ctx.fill();
  ctx.strokeStyle = '#222'; ctx.stroke();
  // Texto
  ctx.fillStyle = '#111'; ctx.textAlign = 'center';
  ctx.fillText(txt, cx, by + bh - 5);
  ctx.restore();
}

// ── Render principal ──────────────────────────────────────
function renderFrame() {
  ctx.save();
  const sx = cv.width / LW, sy = cv.height / LH;
  ctx.setTransform(sx, 0, 0, sy, 0, 0);

  drawField();

  if (state === 'playing' || state === 'goal') {
    drawBallSprite();
    drawPlayerSprite(p1);
    drawPlayerSprite(p2);
    drawHUD();
    drawGoalFlash();
    drawConfetti();
    drawGoalText();
    drawSpeechBubble();
  }

  if (state === 'countdown') {
    drawBallSprite();
    drawPlayerSprite(p1);
    drawPlayerSprite(p2);
    drawHUD();
    drawCountdown();
    drawSpeechBubble();
  }

  ctx.restore();
}

// ── Game loop ─────────────────────────────────────────────
let prevJumpP1 = false, prevJumpP2 = false;
let prevKickP1 = false, prevKickP2 = false;

function loop() {
  if (state === 'playing') {
    const ljP1 = !!(keys['KeyW'] || keys['Space'] || TC.p1u);
    const ljP2 = !!(keys['ArrowUp'] || TC.p2u);

    const jP1 = ljP1 && !prevJumpP1;
    const jP2 = ljP2 && !prevJumpP2;
    prevJumpP1 = ljP1;
    prevJumpP2 = ljP2;

    const lP1 = !!(keys['KeyA'] || TC.p1l);
    const rP1 = !!(keys['KeyD'] || TC.p1r);
    updatePlayer(p1, lP1, rP1, jP1);

    // Patada P1: S / ShiftLeft / botón táctil
    const kP1Now = !!(keys['KeyS'] || keys['ShiftLeft'] || TC.p1k);
    if (kP1Now && !prevKickP1) tryKick(p1);
    prevKickP1 = kP1Now;

    if (mode === 'cpu') {
      const ci  = getInputCPU();
      const ljC = ci.jumpNow, jC = ljC && !prevJumpP2;
      prevJumpP2 = ljC;
      updatePlayer(p2, ci.left, ci.right, jC);
    } else {
      const lP2 = !!(keys['ArrowLeft'] || TC.p2l);
      const rP2 = !!(keys['ArrowRight'] || TC.p2r);
      updatePlayer(p2, lP2, rP2, jP2);

      // Patada P2: ↓ / ShiftRight / botón táctil
      const kP2Now = !!(keys['ArrowDown'] || keys['ShiftRight'] || TC.p2k);
      if (kP2Now && !prevKickP2) tryKick(p2);
      prevKickP2 = kP2Now;
    }

    updateBall();
    collideBallHead(p1);
    collideBallHead(p2);
    collideBallHead(p1); // segunda pasada: resuelve overlaps profundos por velocidad alta
    collideBallHead(p2);
    collidePlayerPlayer();
    checkGoal();
    updateXaxa();
    renderFrame();
  } else if (state === 'goal' || state === 'countdown') {
    updateConfetti();
    goalFlash = Math.max(0, goalFlash - 0.04);
    renderFrame();
  } else if (state === 'menu' || state === 'pick1' || state === 'pick2') {
    renderFrame(); // solo campo de fondo
  }

  raf = requestAnimationFrame(loop);
}

// Arrancar el loop inmediatamente (fondo visible detrás del overlay)
raf = requestAnimationFrame(loop);

// ── UI: menú principal ────────────────────────────────────
document.getElementById('btn-cpu').addEventListener('click', () => showPick('cpu'));
document.getElementById('btn-2p').addEventListener('click',  () => showPick('local'));

function showOverlay(html) {
  overlay.classList.remove('hidden');
  overlay.innerHTML = html;
}

function showPick(m) {
  mode = m;
  // En modo CPU, p2 es CPU con Barcia fijo; el jugador solo elige su personaje
  if (m === 'cpu') {
    p1sel = 'feli';
    p2sel = 'rodo';
    showPickP1(true);
  } else {
    p1sel = 'feli';
    p2sel = 'rodo';
    showPickP1(false);
  }
}

function playerCardsHTML(selectedKey, idPrefix) {
  return PLAYERS_DATA.map(p =>
    `<div class="pick-card${p.key === selectedKey ? ' sel' : ''}" data-key="${p.key}" onclick="pickCard(this,'${idPrefix}')">
       <img src="${p.key}-sprite.png" alt="${p.name}">
       <span>${p.name}</span>
     </div>`
  ).join('');
}

function showPickP1(cpuMode) {
  showOverlay(`
    <img class="ov-logo" src="escudo.png" alt="PH">
    <div class="ov-title" style="font-size:clamp(1.8rem,6vw,2.8rem)">ELEGÍ TU JUGADOR</div>
    <div class="ov-pick-label">${cpuMode ? 'Tu personaje' : 'Jugador 1'}</div>
    <div class="pick-grid" id="pg1">${playerCardsHTML(p1sel,'p1')}</div>
    <div class="ov-btns">
      <button class="ov-btn ov-btn-primary" onclick="${cpuMode ? 'launchGame()' : 'showPickP2()'}">
        ${cpuMode ? '▶ Jugar' : 'Siguiente →'}
      </button>
      <button class="ov-btn ov-btn-secondary" onclick="showMenu()">Atrás</button>
    </div>
  `);
}

function showPickP2() {
  showOverlay(`
    <img class="ov-logo" src="escudo.png" alt="PH">
    <div class="ov-title" style="font-size:clamp(1.8rem,6vw,2.8rem)">JUGADOR 2</div>
    <div class="ov-pick-label">Elegí tu personaje</div>
    <div class="pick-grid" id="pg2">${playerCardsHTML(p2sel,'p2')}</div>
    <div class="ov-btns">
      <button class="ov-btn ov-btn-primary" onclick="launchGame()">▶ Jugar</button>
      <button class="ov-btn ov-btn-secondary" onclick="showPickP1(false)">← Atrás</button>
    </div>
  `);
}

function pickCard(el, prefix) {
  const key = el.dataset.key;
  if (prefix === 'p1') p1sel = key;
  else                  p2sel = key;
  el.closest('.pick-grid').querySelectorAll('.pick-card').forEach(c => c.classList.remove('sel'));
  el.classList.add('sel');
}

function launchGame() {
  p1 = makePlayer(0, p1sel);
  p2 = makePlayer(1, mode === 'cpu' ? 'titan' : p2sel);
  resetBall(Math.random() > 0.5 ? 0 : 1);
  confetti   = [];
  goalFlash  = 0;
  prevJumpP1 = false;
  prevJumpP2 = false;
  state      = 'playing';
  syncTouchUI();
  overlay.classList.add('hidden');
}

function showGameover() {
  const winner  = p1.score >= WIN_GOALS ? p1 : p2;
  const loser   = p1.score >= WIN_GOALS ? p2 : p1;
  const isCPU   = mode === 'cpu' && winner === p2;
  const titleTx = isCPU ? '¡PERDISTE!' : `¡${winner.name.toUpperCase()} GANÓ!`;
  showOverlay(`
    <img class="ov-logo" src="escudo.png" alt="PH">
    <div class="ov-title" style="font-size:clamp(1.6rem,6vw,2.8rem)">${titleTx}</div>
    <div class="ov-score">${p1.score} — ${p2.score}</div>
    <div class="ov-btns">
      <button class="ov-btn ov-btn-primary"   onclick="launchGame()">▶ Revancha</button>
      <button class="ov-btn ov-btn-secondary" onclick="showMenu()">Menú</button>
    </div>
  `);
}

function showMenu() {
  state = 'menu';
  showOverlay(`
    <img class="ov-logo" src="escudo.png" alt="PH">
    <div class="ov-title">CABEZUDOS</div>
    <div class="ov-sub">Playa Honda Universitario</div>
    <div class="ov-btns">
      <button class="ov-btn ov-btn-primary"   id="btn-cpu">▶ 1 Jugador (vs CPU)</button>
      <button class="ov-btn ov-btn-secondary" id="btn-2p">👥 2 Jugadores</button>
    </div>
  `);
  document.getElementById('btn-cpu').addEventListener('click', () => showPick('cpu'));
  document.getElementById('btn-2p').addEventListener('click',  () => showPick('local'));
}

// Tecla Escape = menú | R = Xaxa comenta
document.addEventListener('keydown', e => {
  if (e.code === 'Escape' && (state === 'playing' || state === 'goal')) showMenu();
  if (e.code === 'KeyR') xaxaComment();
});

// ── Pantalla completa landscape (móvil) ──────────────────
(function () {
  const btn = document.getElementById('btn-fullscreen');

  async function enterFS() {
    try { await document.documentElement.requestFullscreen({ navigationUI: 'hide' }); } catch(e) {}
    try { if (screen.orientation?.lock) await screen.orientation.lock('landscape'); } catch(e) {}
  }
  async function exitFS() {
    try { if (document.fullscreenElement) await document.exitFullscreen(); } catch(e) {}
    try { screen.orientation?.unlock?.(); } catch(e) {}
  }

  btn.addEventListener('click', () => {
    if (document.fullscreenElement) exitFS(); else enterFS();
  });

  document.addEventListener('fullscreenchange', () => {
    const isFS = !!document.fullscreenElement;
    btn.textContent = isFS ? '✕ Salir' : '⛶ Pantalla completa';
    resizeCanvas();
    renderFrame();
  });
})();
</script>
</body>
