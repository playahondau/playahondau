<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Universitario · Playa Honda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{margin:0;padding:0;background:#f0f2f5;font-family:'Barlow',Helvetica,sans-serif;}

#diario{background:#f0f2f5;color:#1a1a1a;padding:3rem 1rem;}
.dr-wrap{max-width:960px;margin:0 auto;padding:2rem;border-radius:12px;border:5px solid transparent;background:#ffffff padding-box,repeating-linear-gradient(90deg,#1a3a8f 0px,#1a3a8f 14px,transparent 14px,transparent 28px) border-box;}

/* ── Cabecera ── */
.dr-top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;border-top:3px solid #1a1a1a;border-bottom:1px solid #1a1a1a;padding:.4rem 0;margin-bottom:.2rem;}
.dr-top img{mix-blend-mode:multiply;width:44px;height:44px;object-fit:contain;display:block;}
.dr-name{font-family:'Georgia','Times New Roman',serif;font-size:clamp(1.8rem,5.5vw,3.8rem);font-weight:700;letter-spacing:.04em;line-height:1;text-align:center;color:#1a3a8f;padding:0 1rem;}
.dr-meta{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;color:#555;letter-spacing:.06em;text-align:right;}
.dr-tagline{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:1.2rem;color:#fff;background:#1a3a8f;padding:.35rem .6rem;border-radius:3px;}

/* ── Titular destacado ancho completo ── */
.dr-featured{border-bottom:2px solid #1a3a8f;padding-bottom:.9rem;margin-bottom:1.2rem;}
.dr-kicker{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:#8b0000;margin-bottom:.3rem;}
.dr-titular{font-family:'Georgia','Times New Roman',serif;font-size:clamp(1.4rem,3vw,2.1rem);font-weight:700;line-height:1.15;margin-bottom:.4rem;}
.dr-subtit{font-family:'Barlow',sans-serif;font-size:.85rem;color:#444;margin:0;}

/* ── Grid: crónica izquierda (secundaria) | resultados+fixture derecha (protagonista) ── */
.dr-grid{display:grid;grid-template-columns:1fr 2fr;gap:1.8rem;align-items:start;}
.dr-col-cron{border-right:1px solid #ccc;padding-right:1.8rem;}
.dr-sh{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;border-top:2px solid #1a1a1a;border-bottom:1px solid #ccc;padding:.22rem 0;margin-bottom:.7rem;}
.dr-sh-sec{color:#555;}

/* ── Crónica (secundaria) ── */
.dr-cron-label{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#888;margin-bottom:.4rem;}
.dr-body{font-family:'Georgia',serif;font-size:.82rem;line-height:1.75;color:#333;}
.dr-goles-main{font-family:'Barlow Condensed',sans-serif;font-size:.8rem;color:#1a3a8f;margin-top:.7rem;letter-spacing:.04em;border-top:1px dotted #ccc;padding-top:.5rem;}

/* ── Tarjetas de resultados (protagonistas) ── */
.dr-cat{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#888;margin-bottom:.1rem;}
.dr-result-card{padding:.55rem .75rem;margin-bottom:.4rem;border-left:4px solid #ccc;border-radius:0 4px 4px 0;}
.dr-result-win {border-left-color:#1a6b1a;background:#f0faf0;}
.dr-result-draw{border-left-color:#9a6f00;background:#fefce8;}
.dr-result-loss{border-left-color:#a00000;background:#fff5f5;}
.dr-score-big{font-family:'Barlow Condensed',sans-serif;font-size:1.05rem;font-weight:700;line-height:1.2;}
.dr-result-meta{font-size:.67rem;color:#777;margin-top:.15rem;}
.dr-goles{font-family:'Barlow Condensed',sans-serif;font-size:.72rem;color:#1a3a8f;margin-top:.2rem;}

/* ── Tarjetas de próximos partidos ── */
.dr-next-card{padding:.5rem .75rem;margin-bottom:.35rem;border-left:3px solid #1a3a8f;background:#f4f6fb;border-radius:0 4px 4px 0;}
.dr-next-match{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;font-weight:700;color:#1a1a1a;line-height:1.2;}
.dr-next-meta{font-size:.68rem;color:#666;margin-top:.12rem;}

@media(max-width:620px){
  .dr-grid{grid-template-columns:1fr;}
  .dr-col-cron{border-right:none;padding-right:0;border-bottom:1px solid #ccc;padding-bottom:1.2rem;margin-bottom:.2rem;}
  .dr-top{flex-wrap:wrap;gap:.3rem;justify-content:center;}
  .dr-meta{flex:none;width:100%;text-align:center!important;}
}
</style>
</head>

<body>

<section id="diario">
  <div class="dr-wrap" id="diario-inner">
    <p style="text-align:center;font-family:'Barlow Condensed',sans-serif;color:#888;letter-spacing:.15em;font-size:.8rem;">Cargando edición&hellip;</p>
  </div>
</section>

<script>
// CSV de la sheet de resultados (todas las columnas, incluyendo "cronica" en L)
var CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRk1EbUsbN8nC4fWhW0-Q9jhHuM-BY7DN6kRyPL3unosT2p8JVK2Y7IJjhPBRSBySbbKvy6es_0wJ5L/pub?gid=0&single=true&output=csv";

// Apps Script solo para el fixture (próximos partidos)
var API_URL = "https://script.google.com/macros/s/AKfycbxqrgjhny8rrUjlFkJjydsUdVy7Xp9TzaqY4k6EwdbMFpPgdCWnPOmezlAoocdQbLAQ/exec";

// Parser de CSV que respeta campos entre comillas (por si la crónica tiene comas)
function parseCSVRow(row) {
  var cols = [], cur = '', inQ = false;
  for (var i = 0; i < row.length; i++) {
    var c = row[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur);
  return cols;
}

Promise.all([
  fetch(CSV_URL).then(function(r){ return r.text(); }),
  fetch(API_URL).then(function(r){ return r.json(); }).catch(function(){ return {}; })
])
.then(function(res) {
  var csvText = res[0];
  var apiData = res[1];

  // Parsear resultados del CSV
  var rows = csvText.split('\n').slice(1);
  var resultados = [];
  rows.forEach(function(row) {
    if (!row.trim()) return;
    var c = parseCSVRow(row);
    // Columnas: A=categoria B=rival C=score D=estado E=localia F=dia G=fecha H=goleadores ... L(11)=cronica
    resultados.push({
      categoria:  (c[0]||'').trim(),
      rival:      (c[1]||'').trim(),
      score:      (c[2]||'').trim(),
      estado:     (c[3]||'').trim().toLowerCase(),
      localia:    (c[4]||'').trim(),
      dia:        (c[5]||'').trim(),
      fecha:      (c[6]||'').trim(),
      goleadores: (c[7]||'').trim(),
      cronica:    (c[11]||'').trim()   // columna L
    });
  });

  var fixture = (apiData.fixture) || [];
  renderDiario(resultados, fixture);
})
.catch(function(){
  document.getElementById('diario-inner').innerHTML =
    '<p style="text-align:center;color:#888;font-family:\'Barlow Condensed\',sans-serif;letter-spacing:.1em;">No se pudo cargar el diario.</p>';
});

function renderDiario(resultados, fixture) {
  var sec = document.getElementById('diario-inner');
  if (!sec || !resultados || !resultados.length) { sec.innerHTML = ''; return; }

  var ahora   = new Date();
  var diasSem = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  var mesesN  = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  var fechaStr = diasSem[ahora.getDay()]+' '+ahora.getDate()+' de '+mesesN[ahora.getMonth()]+' de '+ahora.getFullYear();
  var edicion  = Math.floor(Math.random()*80+40);

  var r   = resultados[0];
  var res = r.estado;           // victoria | empate | derrota
  var rival = r.rival;
  var sc    = r.score;
  var cat   = r.categoria;

  var TIT = {
    victoria:[
      'PLAYA HONDA APLASTA A '+rival.toUpperCase()+' CON UN CONTUNDENTE '+sc,
      'NOCHE AZUL EN '+cat.toUpperCase()+': VICTORIA HISTÓRICA DE LOS UNIVERSITARIOS',
      'IMPARABLES: LOS AZULES SE IMPONEN '+sc+' Y SIGUEN SOÑANDO',
      'DOMINIO TOTAL: PLAYA HONDA APLICA '+sc+' Y SUMA TRES PUNTOS DE ORO'
    ],
    empate:[
      'SE REPARTEN LOS PUNTOS: PLAYA HONDA Y '+rival.toUpperCase()+' IGUALAN '+sc,
      'PUNTO VALIOSO DE LOS UNIVERSITARIOS ANTE '+rival.toUpperCase(),
      'NI VENCEDORES NI VENCIDOS: EMPATE JUSTO EN '+cat.toUpperCase()
    ],
    derrota:[
      'GOLPE DURO: PLAYA HONDA CAE ANTE '+rival.toUpperCase()+' POR '+sc,
      'TROPIEZO AZUL QUE DUELE EN '+cat.toUpperCase(),
      'DURA NOCHE UNIVERSITARIA: DERROTA '+sc+' ANTE '+rival.toUpperCase()
    ]
  };
  var SUB = {
    victoria:['Los azules demostraron carácter y se llevaron los tres puntos.','Una victoria que levanta el ánimo de toda la hinchada universitaria.','Playa Honda sumó de a tres y sigue en la pelea por los primeros puestos.'],
    empate:['Un punto que puede valer mucho en el balance final de la temporada.','Reparto justo en un partido disputado y equilibrado de principio a fin.'],
    derrota:['Los universitarios deberán reponerse de cara a la próxima fecha.','Golpe duro que no define, pero obliga a responder en el siguiente partido.']
  };
  var CRON = {
    victoria:['Desde el primer silbato Playa Honda mostró intensidad. Los azules cerraron bien los espacios atrás y fueron peligrosos en ataque, con una ventaja que reflejan los números: '+sc+'. Tres puntos vitales para la campaña universitaria.','Un partido para enmarcar. Playa Honda manejó los tiempos con inteligencia, sostuvo la presión y terminó siendo justo vencedor. El '+sc+' es elocuente.'],
    empate:['Un partido parejo de principio a fin. Playa Honda mostró solvencia defensiva y generó situaciones, aunque el gol no llegó a más. El punto suma y el equipo sigue en carrera.'],
    derrota:['La derrota duele pero no define. Playa Honda compitió, tuvo momentos, pero el rival fue más efectivo. Ahora toca reponerse y pensar en la próxima fecha con la cabeza alta.']
  };

  var arr     = TIT[res] || TIT.derrota;
  var titular = arr[Math.floor(Math.random()*arr.length)];
  var sarr    = SUB[res] || SUB.derrota;
  var subtit  = sarr[Math.floor(Math.random()*sarr.length)];
  var carr    = CRON[res] || CRON.derrota;

  // Si escribiste la crónica en la columna L del sheet, se usa esa. Si no, texto automático.
  var cronica = r.cronica
    ? r.cronica
    : carr[Math.floor(Math.random()*carr.length)];

  // Parsea "Visita- Arrayanes" → { lado: "Visita", cancha: "Arrayanes" }
  function parseLoc(loc) {
    var parts = loc.split('-');
    return {
      lado:   parts[0].trim(),
      cancha: parts.slice(1).join('-').trim()
    };
  }

  var resHtml = resultados.slice(0,6).map(function(rv) {
    var cardCls = rv.estado==='victoria'?'dr-result-win':rv.estado==='empate'?'dr-result-draw':'dr-result-loss';
    var col     = rv.estado==='victoria'?'#1a6b1a':rv.estado==='empate'?'#9a6f00':'#a00000';
    var badge   = rv.estado==='victoria'?'▲ ':rv.estado==='empate'?'▬ ':'▼ ';
    var loc     = parseLoc(rv.localia);
    var golesHtml = rv.goleadores
      ? '<div class="dr-goles">&#9917; '+rv.goleadores.split(';').map(function(g){return g.trim();}).join(' &nbsp;·&nbsp; ')+'</div>'
      : '';
    return '<div class="dr-result-card '+cardCls+'">'+
      '<div class="dr-cat">'+rv.categoria+'</div>'+
      '<div class="dr-score-big" style="color:'+col+'">'+badge+'Playa Honda '+rv.score+' '+rv.rival+'</div>'+
      '<div class="dr-result-meta">'+rv.dia+' &middot; '+rv.fecha+' &middot; '+loc.lado+(loc.cancha?' &middot; &#128205; '+loc.cancha:'')+'</div>'+
      golesHtml+
    '</div>';
  }).join('');

  var fixHtml = (fixture.length
    ? fixture.slice(0,6).map(function(f) {
        return '<div class="dr-next-card">'+
          '<div class="dr-cat">'+f.categoria+'</div>'+
          '<div class="dr-next-match">'+f.local+' vs '+f.visitante+'</div>'+
          '<div class="dr-next-meta">'+f.dia_hora+(f.lugar?' &middot; '+f.lugar:'')+'</div>'+
        '</div>';
      }).join('')
    : '<p style="font-size:.78rem;color:#888;font-family:\'Barlow Condensed\',sans-serif;">Sin fixture disponible.</p>'
  );

  var loc0 = parseLoc(r.localia);

  sec.innerHTML =
    /* ── Cabecera ── */
    '<div class="dr-top">'+
      '<img src="https://playahondau.github.io/playahondau/escudo.png" style="width:44px;height:44px;object-fit:contain;display:block;" alt="Escudo">'+
      '<h2 class="dr-name">FINDE DEL PLAYA</h2>'+
      '<span class="dr-meta">'+fechaStr+'</span>'+
    '</div>'+
    '<p class="dr-tagline">Playa Honda Universitario &middot; Liga Universitaria del Uruguay &middot; Desde 1964</p>'+
    /* ── Titular ancho completo ── */
    '<div class="dr-featured">'+
      '<p class="dr-kicker">'+cat+' &middot; '+r.dia+' '+r.fecha+' &middot; '+loc0.lado+(loc0.cancha?' &middot; &#128205; '+loc0.cancha:'')+'</p>'+
      '<h3 class="dr-titular">'+titular+'</h3>'+
      '<p class="dr-subtit">'+subtit+'</p>'+
    '</div>'+
    /* ── Grid: crónica (1fr) | resultados+fixture (2fr) ── */
    '<div class="dr-grid">'+
      /* Columna izquierda: crónica secundaria */
      '<div class="dr-col dr-col-cron">'+
        '<h4 class="dr-sh dr-sh-sec">Cr&oacute;nica</h4>'+
        '<p class="dr-body">'+cronica+'</p>'+
        (r.goleadores ? '<p class="dr-goles-main">&#9917; '+r.goleadores.split(';').map(function(g){return g.trim();}).join(' &nbsp;·&nbsp; ')+'</p>' : '')+
      '</div>'+
      /* Columna derecha: resultados + fixture protagonistas */
      '<div class="dr-col dr-col-main">'+
        '<h4 class="dr-sh">Resultados del finde</h4>'+
        resHtml+
        '<h4 class="dr-sh" style="margin-top:1.4rem">Pr&oacute;ximos partidos</h4>'+
        fixHtml+
      '</div>'+
    '</div>';
}
</script>

</body>
</html>
