<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados Playa Honda</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body style="margin:0;padding:0;background:#07111f;font-family:'Barlow',Helvetica,sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background:#07111f;padding:40px 0;">
<tr>
<td align="center">

<!-- CONTENEDOR PRINCIPAL -->
<table width="620" cellpadding="0" cellspacing="0" style="background:linear-gradient(180deg,#0c1728,#0b1320);border-radius:24px;padding:40px;border:1px solid rgba(255,255,255,.05);box-shadow:0 10px 40px rgba(0,0,0,.45);">

<!-- HEADER -->
<tr>
<td align="center" style="padding-bottom:32px;">

  <img
    src="https://playahondau.github.io/playahondau/escudo%20del%20playa.jpg"
    width="80"
    style="display:block;margin:0 auto 18px auto;filter:drop-shadow(0 0 18px rgba(212,175,55,.35));"
  >

  <p style="margin:0 0 8px 0;color:#8ea4c7;font-family:'Barlow Condensed',Helvetica,sans-serif;font-size:11px;font-weight:700;letter-spacing:.45em;text-transform:uppercase;">
    Playa Honda Universitario
  </p>

  <h1 style="margin:0;font-family:'Bebas Neue',Impact,sans-serif;font-size:58px;line-height:.95;color:#ffffff;font-weight:400;letter-spacing:.04em;text-transform:uppercase;text-shadow:0 0 30px rgba(255,255,255,.08);">
    Resultados
  </h1>

  <p style="margin:12px 0 0 0;color:#d4af37;font-family:'Barlow Condensed',Helvetica,sans-serif;font-size:13px;letter-spacing:.3em;text-transform:uppercase;font-weight:700;">
    Fin de semana
  </p>

  <div style="width:100px;height:3px;background:#d4af37;border-radius:999px;margin:20px auto 0 auto;box-shadow:0 0 12px rgba(212,175,55,.35);"></div>

</td>
</tr>

<!-- RESULTADOS DINÁMICOS -->
<tr>
<td>
  <div id="resultados"></div>
</td>
</tr>

<!-- FOOTER -->
<tr>
<td align="center" style="padding-top:36px;border-top:1px solid rgba(255,255,255,.05);">
  <p style="margin:0;color:#7d8ea8;font-family:'Barlow Condensed',Helvetica,sans-serif;font-size:12px;letter-spacing:.15em;text-transform:uppercase;">
    Liga Universitaria del Uruguay &middot; Desde 1964
  </p>
  <p style="margin:10px 0 0 0;color:#d4af37;font-family:'Barlow Condensed',Helvetica,sans-serif;font-size:13px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;">
    #SomosPlaya
  </p>
</td>
</tr>

</table>
</td>
</tr>
</table>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRk1EbUsbN8nC4fWhW0-Q9jhHuM-BY7DN6kRyPL3unosT2p8JVK2Y7IJjhPBRSBySbbKvy6es_0wJ5L/pub?gid=0&single=true&output=csv")
.then(r => r.text())
.then(data => {

  const rows = data.split("\n").slice(1);
  let html = "";

  rows.forEach(row => {
    if (row.trim() === "") return;
    const cols = row.split(",");

    const categoria  = cols[0] || "";
    const rival      = cols[1] || "";
    const resultado  = cols[2] || "";
    const estado     = cols[3] || "";
    const localia    = cols[4] || "";
    const dia        = cols[5] || "";
    const fecha      = cols[6] || "";
    const goleadores = (cols[7] || "").trim();

    let color = "#cfcfcf";
    if (estado.toLowerCase() === "victoria") color = "#41d17d";
    if (estado.toLowerCase() === "derrota")  color = "#ff6b6b";
    if (estado.toLowerCase() === "empate")   color = "#cfcfcf";

    const golesHtml = goleadores
      ? `<p style="margin:10px 0 0 0;font-family:'Barlow Condensed',Helvetica,sans-serif;font-size:13px;color:#d4af37;letter-spacing:.05em;">
           &#9917; ${goleadores.split(";").map(g => g.trim()).join(" &nbsp;&#183;&nbsp; ")}
         </p>`
      : "";

    html += `
    <table width="100%" cellpadding="0" cellspacing="0" style="background:rgba(19,39,68,.95);border-radius:16px;margin-bottom:16px;border-left:4px solid ${color};overflow:hidden;">
    <tr><td style="padding:20px 24px;">

      <p style="margin:0 0 6px 0;font-family:'Barlow Condensed',Helvetica,sans-serif;font-size:11px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:#8ea4c7;">
        ${categoria}
      </p>

      <p style="margin:0 0 4px 0;font-family:'Bebas Neue',Impact,sans-serif;font-size:40px;line-height:1;color:#ffffff;letter-spacing:.04em;">
        Playa Honda <span style="color:#1e4fad;">${resultado}</span> ${rival}
      </p>

      <p style="margin:6px 0 0 0;font-family:'Barlow Condensed',Helvetica,sans-serif;font-size:13px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:${color};">
        &#9679; ${estado}
      </p>

      <p style="margin:10px 0 0 0;font-family:'Barlow',Helvetica,sans-serif;font-size:13px;color:#9fb0ca;text-transform:capitalize;">
        &#128197; ${fecha} &nbsp;&middot;&nbsp; ${dia} &nbsp;&middot;&nbsp; ${localia}
      </p>

      ${golesHtml}

    </td></tr>
    </table>`;
  });

  document.getElementById("resultados").innerHTML = html;
});
</script>

</body>
</html>
