color:white;
<!-- HEADER -->
<tr>

<img

<!-- SCRIPT -->
<script>

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRk1EbUsbN8nC4fWhW0-Q9jhHuM-BY7DN6kRyPL3unosT2p8JVK2Y7IJjhPBRSBySbbKvy6es_0wJ5L/pub?gid=0&single=true&output=csv")
.then(response => response.text())
.then(data => {

  const rows = data.split("\n").slice(1);

  let html = "";

  rows.forEach(row => {

    if(row.trim() === "") return;

    const cols = row.split(",");

   const categoria = cols[0] || "";
const rival = cols[1] || "";
const resultado = cols[2] || "";
const estado = cols[3] || "";
const localia = cols[4] || "";
const fecha = cols[5] || "";

let color = "#d0d0d0";

if (estado.toLowerCase() === "victoria")
  color = "#41d17d";

if (estado.toLowerCase() === "derrota")
  color = "#ff6b6b";

if (estado.toLowerCase() === "empate")
  color = "#cfcfcf";

    html += `

    <table width="100%" cellpadding="0" cellspacing="0" style="
    background:rgba(19,39,68,.95);
    border-radius:18px;
    padding:24px;
    margin-bottom:18px;
    border-left:5px solid ${color};
    ">

    <tr>
    <td>

    <p style="
    margin:0;
    font-size:13px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:#8ea4c7;
    font-weight:bold;
    ">
    ${categoria}
    </p>

    <h2 style="
    margin:10px 0 8px 0;
    font-size:38px;
font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
letter-spacing:-1px;
    color:#ffffff;
    line-height:1.1;
    ">
    Playa Honda ${resultado} ${rival}
    </h2>

    <p style="
    margin:0;
    color:${color};
    font-weight:bold;
    font-size:15px;
    ">
    ● ${estado}
    </p>

    <p style="
    margin-top:12px;
    margin-bottom:0;
    color:#9fb0ca;
    font-size:14px;
    ">
📅 ${fecha} · ${localia}
    </p>

    </td>
    </tr>

    </table>

    `;
  });

  document.getElementById("resultados").innerHTML = html;

});

</script>

</body>
</html>
